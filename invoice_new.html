{% extends "base.html" %}{% block title %}WannyGest - Nouvelle facture{% endblock %}{% block content %}
<div class="page-header"><h1>💰 Nouvelle facture</h1><a href="/comptabilite" class="btn btn-outline btn-sm">← Retour</a></div>
<div class="card" style="max-width:700px"><div class="card-body"><form method="post">
    <div class="form-row">
        <div class="form-group"><label>Client *</label><select name="client_id" onchange="var o=this.options[this.selectedIndex];document.getElementById('cn').value=o.text||''"><option value="">—</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
        <div class="form-group"><label>Nom client</label><input type="text" name="client_name" id="cn" required></div>
    </div>
    <div class="form-group"><label>Objet *</label><input type="text" name="objet" required placeholder="Installation vidéosurveillance..."></div>
    
    <!-- TVA checkbox -->
    <div style="background:#fff8ed;padding:10px;border-radius:8px;border:1px solid #ffe4b5;margin-bottom:12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <label style="display:flex;gap:6px;align-items:center;cursor:pointer;font-weight:700;color:#e8672a">
            <input type="checkbox" name="tva_active" value="1" id="tvaCheck" onchange="toggleTVA()">
            Appliquer la TVA
        </label>
        <div id="tvaRateWrap" style="display:none;display:flex;align-items:center;gap:6px">
            <label style="font-size:12px">Taux :</label>
            <input type="number" name="tva_rate" id="tvaRate" value="{{ tva_default|default(18) }}" step="0.5" min="0" max="50" oninput="calcTTC()" style="width:70px;padding:5px">
            <span>%</span>
        </div>
        <div style="flex:1;font-size:11px;color:#888">💡 Taux par défaut : {{ tva_default|default(18) }} %. Cochez pour l'ajouter au TTC.</div>
    </div>
    
    <div class="form-row">
        <div class="form-group"><label>Montant HT (FCFA)</label><input type="number" name="total_ht" id="ht" step="1" min="0" oninput="calcTTC()"></div>
        <div class="form-group"><label>TVA</label><input type="number" name="tva" id="tva" step="1" readonly placeholder="0"></div>
        <div class="form-group"><label>Montant TTC</label><input type="number" name="amount" id="ttc" step="1" min="0"><input type="hidden" name="total_ttc" id="ttc2"></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Échéance</label><input type="date" name="due_date"></div>
        <div class="form-group"><label>Moyen de paiement</label><select name="payment_method"><option>Virement</option><option>Espèces</option><option>Chèque</option><option>Mobile Money</option></select></div>
    </div>
    <div class="form-group"><label>Description / Notes</label><textarea name="description" rows="2" style="width:100%;padding:8px;border:1.5px solid #ddd;border-radius:7px;font-size:13px"></textarea></div>
    <div style="display:flex;gap:10px;margin-top:14px"><a href="/comptabilite" class="btn btn-outline">Annuler</a><button type="submit" class="btn btn-primary">💰 Créer la facture</button></div>
</form></div></div>
<script>
function toggleTVA(){
    var checked = document.getElementById('tvaCheck').checked;
    document.getElementById('tvaRateWrap').style.display = checked ? 'flex' : 'none';
    calcTTC();
}
function calcTTC(){
    var ht = parseFloat(document.getElementById('ht').value) || 0;
    var active = document.getElementById('tvaCheck').checked;
    var rate = parseFloat(document.getElementById('tvaRate').value); if (isNaN(rate)) rate = {{ tva_default|default(18) }};
    var tva = active ? Math.round(ht * rate / 100) : 0;
    document.getElementById('tva').value = tva;
    var ttc = ht + tva;
    document.getElementById('ttc').value = ttc;
    document.getElementById('ttc2').value = ttc;
}
</script>
{% endblock %}
